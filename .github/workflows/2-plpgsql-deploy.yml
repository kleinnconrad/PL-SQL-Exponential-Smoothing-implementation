name: 2 - Deploy PL/pgSQL Procedure

on:
  push:
    branches:
      - main
    paths:
      # Only trigger if this exact file is modified
      - 'src/exponential_smoothing_pg.pls'

jobs:
  deploy-procedure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Deploy PL/pgSQL Script
        run: |
          # Explicitly execute only this specific file
          psql "${{ secrets.SUPABASE_PSQL_URL }}" -f src/exponential_smoothing_pg.pls
